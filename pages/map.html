<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="../">
  <title>Карта Мира — Туэрбэлл</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="map">

  <div id="header-placeholder"></div>

  <div class="page-content">
    <main class="section-wide" style="flex:1;">

      <div class="page-header">
        <h1>🗺️ Карта Мира</h1>
        <p>Туэрбэлл — 49 континентов, бесконечная война, один мир</p>
      </div>

      <div class="map-wrapper">
        <div class="map-container" id="map-container">
          <img src="assets/img/map.jpg" alt="Карта мира Туэрбэлл" id="map-img" class="map-img">

          <div class="map-hint" id="map-hint">
            Колесо мыши — зум &nbsp;·&nbsp; Перетащить — перемещение &nbsp;·&nbsp; Двойной клик — приблизить
          </div>

          <div class="map-scale" id="map-scale">100%</div>

          <div class="map-controls">
            <button class="map-btn" onclick="mapViewer.zoomIn()"  title="Приблизить">+</button>
            <button class="map-btn" onclick="mapViewer.zoomOut()" title="Отдалить">−</button>
            <button class="map-btn" onclick="mapViewer.reset()"   title="Сбросить вид">↺</button>
          </div>
        </div>
      </div>

      <p style="color:var(--text-muted);font-size:0.88rem;margin-top:0.75rem;text-align:center;">
        Колесо мыши — масштабирование · Перетаскивание — навигация · Мобильный — щипок двумя пальцами
      </p>

    </main>

    <div id="footer-placeholder"></div>
  </div>

  <script src="assets/js/nav.js"></script>
  <script src="assets/js/map.js"></script>
  <script>const mapViewer = new MapViewer('map-container', 'map-img');</script>
</body>
</html>
